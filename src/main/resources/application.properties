# ===================================================================
# DATABASE CONFIG: H2 In-Memory (Active by default for instant local execution)
# ===================================================================
spring.datasource.url=jdbc:h2:mem:delivery_db;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ===================================================================
# JPA / Hibernate Configurations
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# Thymeleaf Configuration (Caching disabled for live UI changes)
# ===================================================================
spring.thymeleaf.cache=false
spring.thymeleaf.suffix=.html
spring.thymeleaf.prefix=classpath:/templates/

# ===================================================================
# File Upload Configurations for Petrol/Diesel Bills
# ===================================================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Custom directory to save uploaded fuel bills (relative to project root)
upload.dir=uploads/bills

# Logging level
logging.level.org.springframework.security=INFO
logging.level.com.delivery=DEBUG

