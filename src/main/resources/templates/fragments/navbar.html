<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <!-- Top Custom Navbar Fragment -->
    <div th:fragment="navbar(pageTitle)" class="navbar-custom">
        <h4 class="mb-0 text-dark" th:text="${pageTitle}">Portal</h4>
        <div class="d-flex align-items-center">
            
            <!-- Notification Bell Dropdown -->
            <div class="dropdown me-3">
                <button class="btn btn-link text-dark position-relative p-1 border-0" type="button" id="notifBell" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-bell fs-5"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="notifBadge" style="display:none; font-size:0.6rem;">0</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end shadow border-0" aria-labelledby="notifBell" id="notifList" style="width: 320px; border-radius: 1rem; z-index: 1050;">
                    <li><h6 class="dropdown-header text-dark font-weight-bold">Notifications</h6></li>
                    <li><hr class="dropdown-divider"></li>
                    <li id="emptyNotif" class="text-center py-3 text-muted">No new alerts</li>
                    <li class="view-all-li border-top text-center py-2"><a th:href="@{/notifications}" class="dropdown-item text-primary small font-weight-bold" style="background: transparent;">View All Notifications</a></li>
                </ul>
            </div>

            <!-- User-Specific Welcome Message & Action Dropdown -->
            
            <!-- 1. Admin Role User Menu -->
            <th:block sec:authorize="hasRole('ADMIN')">
                <span class="me-3 text-muted">Welcome, <strong>Admin</strong></span>
                <i class="bi bi-person-circle fs-4 text-primary"></i>
            </th:block>

            <!-- 2. Agent Role User Menu -->
            <th:block sec:authorize="hasRole('AGENT')">
                <span class="me-3 text-muted">Agent ID: <strong th:text="${agent != null ? agent.id : #authentication.name}">AGENT-1001</strong></span>
                <div class="dropdown" th:if="${agent != null}">
                    <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle" id="agentProfileDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                        <img th:if="${agent.profileImage != null}" th:src="${agent.profileImage}" class="rounded-circle border" width="36" height="36" style="object-fit: cover;" alt="Avatar">
                        <img th:if="${agent.profileImage == null}" th:src="@{/images/default-avatar.png}" class="rounded-circle border" width="36" height="36" style="object-fit: cover;" alt="Avatar">
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2" aria-labelledby="agentProfileDropdown" style="z-index: 1050;">
                        <li><a class="dropdown-item" th:href="@{/agent/profile}"><i class="bi bi-person-circle me-2 text-primary"></i>My Profile</a></li>
                        <li><a class="dropdown-item" th:href="@{/agent/profile?tab=edit}"><i class="bi bi-pencil-square me-2 text-info"></i>Edit Profile</a></li>
                        <li><a class="dropdown-item" th:href="@{/agent/profile?tab=password}"><i class="bi bi-key-fill me-2 text-warning"></i>Change Password</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" th:href="@{/logout}"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                    </ul>
                </div>
                <i th:if="${agent == null}" class="bi bi-person-circle fs-4 text-primary"></i>
            </th:block>

            <!-- 3. Customer Role User Menu -->
            <th:block sec:authorize="hasRole('CUSTOMER')">
                <span class="me-3 text-muted">Welcome, <strong th:text="${customer != null ? customer.name : 'Customer'}">Customer</strong></span>
                <div class="dropdown">
                    <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle" id="customerProfileDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                        <img th:if="${customer != null && customer.profileImage != null}" th:src="${customer.profileImage}" class="rounded-circle border" width="36" height="36" style="object-fit: cover;" alt="Avatar">
                        <img th:if="${customer == null || customer.profileImage == null}" th:src="@{/images/default-avatar.png}" class="rounded-circle border" width="36" height="36" style="object-fit: cover;" alt="Avatar">
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2" aria-labelledby="customerProfileDropdown" style="z-index: 1050;">
                        <li><a class="dropdown-item" th:href="@{/customer/profile}"><i class="bi bi-person-circle me-2 text-primary"></i>My Profile</a></li>
                        <li><a class="dropdown-item" th:href="@{/customer/profile(tab='edit')}"><i class="bi bi-pencil-square me-2 text-info"></i>Edit Profile</a></li>
                        <li><a class="dropdown-item" th:href="@{/customer/profile(tab='password')}"><i class="bi bi-key-fill me-2 text-warning"></i>Change Password</a></li>
                        <li><a class="dropdown-item" th:href="@{/customer/profile(tab='notifications')}"><i class="bi bi-bell-fill me-2 text-success"></i>Notification Settings</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" th:href="@{/logout}"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                    </ul>
                </div>
            </th:block>
            
        </div>

        <!-- Embedded JavaScript for notifications logic -->
        <script th:inline="javascript">
            document.addEventListener('DOMContentLoaded', function() {
                const notifBadge = document.getElementById('notifBadge');
                const notifList = document.getElementById('notifList');
                const emptyNotif = document.getElementById('emptyNotif');

                function loadNotifications() {
                    if (!notifBadge || !notifList) return;

                    fetch('/api/notifications/unread-count')
                        .then(res => res.json())
                        .then(data => {
                            const count = data.count;
                            if (count > 0) {
                                notifBadge.textContent = count;
                                notifBadge.style.display = 'inline-block';
                            } else {
                                notifBadge.style.display = 'none';
                            }
                        })
                        .catch(err => console.error("Error fetching unread notification count:", err));

                    fetch('/api/notifications/recent')
                        .then(res => {
                            if (!res.ok) throw new Error("Recent notifications error");
                            return res.json();
                        })
                        .then(list => {
                            const items = notifList.querySelectorAll('.notif-item');
                            items.forEach(el => el.remove());

                            if (list && list.length > 0) {
                                if (emptyNotif) emptyNotif.style.display = 'none';
                                list.forEach(n => {
                                    const li = document.createElement('li');
                                    li.className = 'notif-item';
                                    let timeStr = "";
                                    if (n.createdAt) {
                                        timeStr = n.createdAt.replace('T', ' ').substring(11, 16);
                                    }
                                    li.innerHTML = `
                                        <div class="dropdown-item px-3 py-2 border-bottom ${n.isRead ? '' : 'bg-light'}">
                                            <div class="d-flex justify-content-between align-items-start">
                                                <strong class="small text-dark">${n.title}</strong>
                                                <span class="small text-muted" style="font-size:0.7rem;">${timeStr}</span>
                                            </div>
                                            <p class="small mb-1 text-muted text-wrap" style="font-size:0.75rem; line-height:1.3; max-width:280px; white-space:normal;">${n.message}</p>
                                            ${n.isRead ? '' : `<button class="btn btn-link p-0 text-primary font-weight-bold" style="font-size:0.65rem; text-decoration:none;" onclick="markRead(${n.id}, event)">Mark Read</button>`}
                                        </div>
                                    `;
                                    const viewAllLi = notifList.querySelector('.view-all-li');
                                    if (viewAllLi) {
                                        notifList.insertBefore(li, viewAllLi);
                                    } else {
                                        notifList.appendChild(li);
                                    }
                                });
                            } else {
                                if (emptyNotif) emptyNotif.style.display = 'block';
                            }
                        })
                        .catch(err => console.error("Error fetching recent notifications:", err));
                }

                window.markRead = function(id, event) {
                    if (event) {
                        event.preventDefault();
                        event.stopPropagation();
                    }
                    fetch('/api/notifications/mark-read/' + id, { method: 'POST' })
                        .then(res => res.json())
                        .then(data => {
                            if (data.success) {
                                loadNotifications();
                            }
                        })
                        .catch(err => console.error("Error marking notification as read:", err));
                };

                loadNotifications();
                setInterval(loadNotifications, 15000); // Poll every 15 seconds
            });
        </script>
    </div>
</body>
</html>
